<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Englishy — Engels leren</title>
<meta name="theme-color" content="#ff5fb3" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Englishy" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/kawaii-rainbow.css" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--kr-grad-sky);
    background-attachment: fixed;
    color: var(--kr-ink);
    font-family: var(--kr-font-body);
    font-size: 17px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    overscroll-behavior: none;
  }

  /* ---- Background decorations ---- */
  .bg-deco {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .bg-deco .kr-cloud {
    position: absolute;
    opacity: 0.55;
  }
  .bg-deco .cloud-1 {
    font-size: 72px;
    top: 8%;
    left: -15%;
    animation: kr-drift 60s linear infinite;
  }
  .bg-deco .cloud-2 {
    font-size: 48px;
    top: 22%;
    left: -15%;
    animation: kr-drift 80s 20s linear infinite;
    opacity: 0.35;
  }
  .bg-deco .cloud-3 {
    font-size: 56px;
    top: 55%;
    left: -15%;
    animation: kr-drift 70s 40s linear infinite;
    opacity: 0.3;
  }
  .bg-deco .kr-sparkle {
    position: absolute;
  }
  .bg-deco .sp-1 {
    --kr-sparkle-size: 18px;
    --kr-sparkle-color: var(--kr-yellow);
    top: 12%; right: 8%;
    animation: kr-twinkle 3s ease-in-out infinite;
  }
  .bg-deco .sp-2 {
    --kr-sparkle-size: 12px;
    --kr-sparkle-color: var(--kr-pink-2);
    top: 38%; left: 6%;
    animation: kr-twinkle 2.2s 0.6s ease-in-out infinite;
  }
  .bg-deco .sp-3 {
    --kr-sparkle-size: 14px;
    --kr-sparkle-color: var(--kr-violet-2);
    top: 70%; right: 12%;
    animation: kr-twinkle 2.8s 1.2s ease-in-out infinite;
  }
  .bg-deco .sp-4 {
    --kr-sparkle-size: 10px;
    --kr-sparkle-color: var(--kr-mint);
    bottom: 18%; left: 18%;
    animation: kr-twinkle 3.4s 0.3s ease-in-out infinite;
  }

  /* ---- Top bar ---- */
  .topbar {
    position: relative; z-index: 2;
    padding: calc(env(safe-area-inset-top) + 10px) 16px 10px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 2px solid rgba(255,255,255,0.85);
    box-shadow: 0 2px 12px rgba(154,92,255,0.12);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .brand {
    font-family: var(--kr-font-display);
    font-weight: 800;
    font-size: 24px;
    line-height: 1;
    background: var(--kr-grad-title);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 0.5px;
  }
  .tagline {
    font-size: 11px;
    font-weight: 600;
    color: var(--kr-ink-soft);
    white-space: nowrap;
    letter-spacing: 0.04em;
  }

  /* ---- Star HUD pills ---- */
  .star-hud {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .star-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.9);
    border: 2px solid white;
    border-radius: var(--kr-radius-pill);
    padding: 4px 10px;
    box-shadow: 0 4px 0 rgba(154,92,255,0.15), 0 6px 16px rgba(154,92,255,0.1);
    font-family: var(--kr-font-display);
    font-weight: 700;
    font-size: 13px;
    color: var(--kr-violet-3);
  }
  .star-pill .star-num {
    font-weight: 800;
    font-size: 15px;
    color: #e6a100;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .star-pill .star-num.pop {
    transform: scale(1.5);
  }
  .star-pill-total {
    font-size: 11px;
    color: var(--kr-ink-soft);
  }

  /* ---- Topbar brand+tagline group ---- */
  .brand-group {
    display: flex;
    flex-direction: column;
    gap: 1px;
    flex: 1;
    min-width: 0;
  }

  /* ---- Conversation ---- */
  .convo {
    position: relative; z-index: 1;
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 18px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .msg {
    max-width: 86%;
    padding: 13px 17px;
    border-radius: var(--kr-radius-md);
    line-height: 1.5;
    font-size: 17px;
    animation: rise 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    word-wrap: break-word;
    font-family: var(--kr-font-body);
  }
  .msg.tutor {
    align-self: flex-start;
    background: rgba(255,255,255,0.88);
    border: 2px solid white;
    border-bottom-left-radius: var(--kr-radius-sm);
    color: var(--kr-ink);
    box-shadow: var(--kr-shadow-soft);
  }
  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--kr-pink-1), #ffc6e6);
    border: 2px solid rgba(255,255,255,0.8);
    border-bottom-right-radius: var(--kr-radius-sm);
    color: #6a1040;
    font-weight: 500;
    box-shadow: 0 6px 16px rgba(255,95,179,0.2);
  }
  .replay {
    appearance: none;
    margin-top: 8px;
    border: 2px solid var(--kr-violet-1);
    background: var(--kr-violet-1);
    color: var(--kr-violet-3);
    font-family: var(--kr-font-body);
    font-size: 13px;
    font-weight: 600;
    padding: 5px 12px 5px 10px;
    border-radius: var(--kr-radius-pill);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: transform 0.12s ease, background 0.12s ease;
  }
  .replay:active { transform: scale(0.93); background: var(--kr-violet-2); }
  .replay svg { width: 11px; height: 11px; }

  /* thinking dots */
  .thinking {
    align-self: flex-start;
    background: rgba(255,255,255,0.88);
    border: 2px solid white;
    border-radius: var(--kr-radius-md);
    border-bottom-left-radius: var(--kr-radius-sm);
    padding: 14px 18px;
    box-shadow: var(--kr-shadow-soft);
    display: flex;
    gap: 6px;
    animation: rise 0.3s ease both;
  }
  .thinking span {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--kr-pink-3);
    opacity: 0.5;
    animation: blink 1.3s infinite ease-in-out;
  }
  .thinking span:nth-child(2) { animation-delay: 0.18s; }
  .thinking span:nth-child(3) { animation-delay: 0.36s; }

  /* ---- Dock ---- */
  .dock {
    position: relative; z-index: 2;
    padding: 12px 22px calc(env(safe-area-inset-bottom) + 16px);
    background: linear-gradient(rgba(255,230,244,0), rgba(255,230,244,0.95) 38%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .mic {
    appearance: none;
    border: none;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--kr-grad-candy);
    color: #fff;
    cursor: pointer;
    display: grid;
    place-items: center;
    box-shadow: var(--kr-shadow-candy);
    transition: transform 0.14s ease;
    position: relative;
  }
  .mic:active { transform: translateY(4px); box-shadow: 0 4px 0 #c91d7a, 0 6px 12px rgba(201,29,122,0.4); }
  .mic svg { width: 32px; height: 32px; }
  .mic.rec {
    background: linear-gradient(180deg, #ff3ea5, #c91d7a);
  }
  .mic.rec::after {
    content: "";
    position: absolute; inset: -7px;
    border-radius: 50%;
    border: 3px solid var(--kr-pink-hot);
    animation: pulse 1.4s infinite ease-out;
  }
  .mic.busy {
    background: linear-gradient(180deg, #c0a0d8, #9a78ba);
    cursor: default;
    box-shadow: 0 4px 0 #7a5a9a, 0 8px 20px rgba(120,90,160,0.3);
  }
  .mic.busy:active { transform: none; box-shadow: 0 4px 0 #7a5a9a, 0 8px 20px rgba(120,90,160,0.3); }

  .miclabel {
    font-size: 13px;
    font-weight: 600;
    color: var(--kr-ink-soft);
    min-height: 16px;
    text-align: center;
    font-family: var(--kr-font-body);
  }

  /* ---- Start overlay ---- */
  .start {
    position: fixed; inset: 0; z-index: 10;
    background: var(--kr-grad-sky);
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: calc(env(safe-area-inset-top) + 30px) 28px calc(env(safe-area-inset-bottom) + 30px);
    gap: 14px;
    overflow: hidden;
    transition: opacity 0.5s ease;
  }
  .start.hidden { opacity: 0; pointer-events: none; }

  /* Floating decorations inside start overlay */
  .start-deco {
    position: absolute; inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .start-deco .kr-cloud {
    position: absolute;
    opacity: 0.5;
  }
  .start-deco .s-cloud-1 {
    font-size: 90px;
    top: 2%;
    left: -8%;
    animation: kr-drift 55s linear infinite;
  }
  .start-deco .s-cloud-2 {
    font-size: 60px;
    top: 18%;
    right: -8%;
    animation: kr-drift 70s 25s linear infinite;
    opacity: 0.35;
  }
  .start-deco .kr-sparkle {
    position: absolute;
  }
  .start-deco .s-sp-1 {
    --kr-sparkle-size: 22px;
    --kr-sparkle-color: var(--kr-yellow);
    top: 8%; right: 14%;
    animation: kr-twinkle 2.4s ease-in-out infinite;
  }
  .start-deco .s-sp-2 {
    --kr-sparkle-size: 16px;
    --kr-sparkle-color: var(--kr-pink-2);
    top: 30%; left: 8%;
    animation: kr-twinkle 3s 0.5s ease-in-out infinite;
  }
  .start-deco .s-sp-3 {
    --kr-sparkle-size: 20px;
    --kr-sparkle-color: var(--kr-violet-2);
    bottom: 18%; right: 8%;
    animation: kr-twinkle 2.8s 1s ease-in-out infinite;
  }
  .start-deco .s-sp-4 {
    --kr-sparkle-size: 14px;
    --kr-sparkle-color: var(--kr-mint);
    bottom: 28%; left: 12%;
    animation: kr-twinkle 3.2s 0.8s ease-in-out infinite;
  }

  .start-mascot {
    font-size: 72px;
    line-height: 1;
    animation: kr-bob 2.4s ease-in-out infinite;
    position: relative; z-index: 1;
    filter: drop-shadow(0 8px 18px rgba(154,92,255,0.35));
  }

  .start h1 {
    font-family: var(--kr-font-display);
    font-weight: 800;
    font-size: 48px;
    margin: 0;
    letter-spacing: 0.5px;
    background: var(--kr-grad-title);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-stroke: 2px white;
    paint-order: stroke fill;
    text-shadow: 0 4px 0 rgba(255,255,255,0.8);
    position: relative; z-index: 1;
  }

  .kr-rainbow-bar {
    width: 80%;
    max-width: 280px;
    position: relative; z-index: 1;
  }

  .start .sub {
    font-family: var(--kr-font-display);
    font-weight: 700;
    font-size: 18px;
    color: var(--kr-violet-3);
    margin: 0;
    max-width: 20em;
    line-height: 1.4;
    text-shadow: 0 2px 0 rgba(255,255,255,0.7);
    position: relative; z-index: 1;
  }
  .start .copy {
    font-size: 15px;
    line-height: 1.55;
    color: var(--kr-ink-soft);
    max-width: 20em;
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.7);
    border-radius: var(--kr-radius-md);
    padding: 10px 16px;
    border: 2px solid rgba(255,255,255,0.85);
  }
  .startbtn {
    appearance: none;
    font-family: var(--kr-font-display);
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.5px;
    color: white;
    background: var(--kr-grad-candy);
    border: none;
    padding: 16px 42px;
    border-radius: var(--kr-radius-pill);
    cursor: pointer;
    box-shadow: var(--kr-shadow-candy);
    text-shadow: 0 2px 0 rgba(0,0,0,0.15);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    position: relative; z-index: 1;
    margin-top: 6px;
  }
  .startbtn:active {
    transform: translateY(4px);
    box-shadow: 0 4px 0 #c91d7a, 0 6px 12px rgba(201,29,122,0.4);
  }
  .startnote {
    font-size: 13px;
    color: var(--kr-ink-soft);
    position: relative; z-index: 1;
  }

  /* ---- Toast ---- */
  .toast {
    position: fixed;
    left: 50%; bottom: calc(env(safe-area-inset-bottom) + 150px);
    transform: translateX(-50%) translateY(10px);
    z-index: 20;
    background: rgba(74,42,94,0.92);
    color: #fff;
    font-family: var(--kr-font-body);
    font-size: 14px;
    font-weight: 500;
    padding: 12px 20px;
    border-radius: var(--kr-radius-pill);
    box-shadow: 0 10px 30px -10px rgba(74,42,94,0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    max-width: 82%;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---- Tab bar ---- */
  .tabs {
    position: relative; z-index: 2;
    display: flex;
    border-top: 2px solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .tab {
    flex: 1; padding: 9px 4px 11px;
    font-size: 11px; font-weight: 600; text-align: center;
    color: var(--kr-ink-soft); cursor: pointer; user-select: none;
    border: none; background: none;
    font-family: var(--kr-font-body);
    transition: color 0.15s;
  }
  .tab.active {
    color: var(--kr-pink-hot);
    background: rgba(255,95,179,0.1);
    border-top: 3px solid var(--kr-pink-3);
    margin-top: -2px;
  }
  .tab-icon { display: block; font-size: 18px; margin-bottom: 2px; }

  /* ---- Drill UI ---- */
  .drill-wrap {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; padding: 22px 18px; gap: 18px;
    text-align: center; overflow-y: auto;
  }
  .drill-wrap.active { display: flex; }

  .drill-prompt {
    font-family: var(--kr-font-display);
    font-size: 26px;
    font-weight: 700;
    color: var(--kr-ink);
    line-height: 1.3;
    background: rgba(255,255,255,0.85);
    border: 2px solid white;
    border-radius: var(--kr-radius-md);
    padding: 16px 22px;
    box-shadow: var(--kr-shadow-soft);
    width: 100%; max-width: 380px;
  }
  .drill-example {
    font-size: 14px;
    color: var(--kr-ink-soft);
    font-style: italic;
  }
  .drill-feedback {
    font-family: var(--kr-font-body);
    font-size: 15px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: var(--kr-radius-md);
    display: none;
    width: 100%; max-width: 380px;
  }
  .drill-feedback.correct {
    background: linear-gradient(135deg, #d4f5e6, #b8f0d6);
    color: #1a6630;
    border: 2px solid #6dd9a0;
    display: block;
  }
  .drill-feedback.wrong {
    background: linear-gradient(135deg, var(--kr-pink-1), #ffd6ec);
    color: #8b1050;
    border: 2px solid var(--kr-pink-2);
    display: block;
  }
  .drill-options {
    display: flex; flex-direction: column; gap: 10px;
    width: 100%; max-width: 380px;
  }
  .drill-option {
    padding: 14px 18px;
    border-radius: var(--kr-radius-md);
    border: 2px solid rgba(255,255,255,0.9);
    background: rgba(255,255,255,0.88);
    font-family: var(--kr-font-body);
    font-size: 16px;
    cursor: pointer;
    text-align: left;
    box-shadow: var(--kr-shadow-soft);
    transition: background 0.1s, border-color 0.1s, transform 0.1s;
    color: var(--kr-ink);
  }
  .drill-option:active { transform: scale(0.97); background: var(--kr-pink-1); }
  .drill-option.correct-ans {
    background: linear-gradient(135deg, #d4f5e6, #b8f0d6);
    border-color: #6dd9a0;
    color: #1a6630;
  }
  .drill-option.wrong-ans {
    background: linear-gradient(135deg, var(--kr-pink-1), #ffd6ec);
    border-color: var(--kr-pink-2);
    color: #8b1050;
  }
  .drill-next {
    margin-top: 4px;
    padding: 12px 30px;
    border-radius: var(--kr-radius-pill);
    background: var(--kr-grad-candy);
    color: white;
    border: none;
    font-family: var(--kr-font-display);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    box-shadow: 0 6px 0 #c91d7a, 0 12px 20px rgba(201,29,122,0.35);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .drill-next.show { display: block; }
  .drill-next:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #c91d7a, 0 4px 8px rgba(201,29,122,0.3);
  }
  .drill-stats {
    font-size: 12px;
    color: var(--kr-ink-soft);
    font-family: var(--kr-font-body);
  }
  .export-row { display: flex; gap: 10px; margin-top: 4px; }
  .export-btn {
    flex: 1; padding: 10px;
    border-radius: var(--kr-radius-md);
    border: 2px solid rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.85);
    font-family: var(--kr-font-body);
    font-size: 13px;
    cursor: pointer;
    color: var(--kr-violet-3);
    font-weight: 600;
    box-shadow: 0 4px 0 rgba(154,92,255,0.12);
    transition: transform 0.08s;
  }
  .export-btn:active { transform: scale(0.96); }

  /* ---- Star earn animation ---- */
  @keyframes star-float {
    0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-80px) scale(1.6) rotate(20deg); }
  }
  .star-earn {
    position: fixed;
    font-size: 34px;
    z-index: 50;
    pointer-events: none;
    animation: star-float 1s ease-out both;
    filter: drop-shadow(0 0 8px rgba(255,220,0,0.8));
  }

  /* ---- Big celebration overlay ---- */
  .star-celebrate {
    position: fixed; inset: 0; z-index: 60;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(255,102,195,0.18);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .star-celebrate.show { opacity: 1; }
  .star-celebrate-inner {
    background: rgba(255,255,255,0.92);
    border: 3px solid white;
    border-radius: var(--kr-radius-lg);
    padding: 28px 36px;
    text-align: center;
    box-shadow: var(--kr-shadow-float);
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }
  .star-celebrate-emoji { font-size: 52px; animation: kr-bob 1s ease-in-out infinite; }
  .star-celebrate-msg {
    font-family: var(--kr-font-display);
    font-size: 22px;
    font-weight: 800;
    color: var(--kr-violet-3);
  }
  .star-celebrate-bar { width: 200px; }
  .star-celebrate-sparkles {
    display: flex; gap: 14px; justify-content: center;
    font-size: 22px;
  }

  /* ---- Keyframes ---- */
  @keyframes rise    { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes blink   { 0%, 60%, 100% { opacity: 0.35; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }
  @keyframes pulse   { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(1.6); opacity: 0; } }
</style>
</head>
<body>
  <!-- Background decorations -->
  <div class="bg-deco" aria-hidden="true">
    <div class="kr-cloud cloud-1"></div>
    <div class="kr-cloud cloud-2"></div>
    <div class="kr-cloud cloud-3"></div>
    <div class="kr-sparkle sp-1"></div>
    <div class="kr-sparkle sp-2"></div>
    <div class="kr-sparkle sp-3"></div>
    <div class="kr-sparkle sp-4"></div>
  </div>

  <div class="topbar">
    <div class="brand-group">
      <div class="brand">Englishy</div>
      <div class="tagline">Leer Engels met Sterre!</div>
    </div>
    <div class="star-hud">
      <div class="star-pill" title="Sterren vandaag">⭐ <span class="star-num" id="star-session">0</span></div>
      <div class="star-pill" title="Totaal verdiend">🌟 <span class="star-num" id="star-total">0</span><span class="star-pill-total">totaal</span></div>
    </div>
  </div>

  <div class="convo" id="convo"></div>

  <div id="drill-vocab" class="drill-wrap"></div>
  <div id="drill-grammar" class="drill-wrap"></div>
  <div id="drill-silent" class="drill-wrap"></div>

  <div class="dock" id="dock">
    <button class="mic" id="mic" aria-label="Tik om te praten">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"></rect>
        <path d="M5 10a7 7 0 0 0 14 0"></path>
        <line x1="12" y1="19" x2="12" y2="22"></line>
      </svg>
    </button>
    <div class="miclabel" id="miclabel">Tik om te praten</div>
  </div>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-mode="convo"><span class="tab-icon">💬</span>Praten</button>
    <button class="tab" data-mode="vocab"><span class="tab-icon">🗣️</span>Woorden</button>
    <button class="tab" data-mode="grammar"><span class="tab-icon">✏️</span>Zinnen</button>
    <button class="tab" data-mode="silent"><span class="tab-icon">🤫</span>Kiezen</button>
  </nav>

  <div class="toast" id="toast"></div>

  <!-- Star celebration overlay -->
  <div class="star-celebrate" id="star-celebrate" aria-live="polite" aria-atomic="true">
    <div class="star-celebrate-inner">
      <div class="star-celebrate-emoji">🌈</div>
      <div class="star-celebrate-msg" id="star-celebrate-msg">Wauw Isa! Al 10 sterren!</div>
      <div class="kr-rainbow-bar star-celebrate-bar"></div>
      <div class="star-celebrate-sparkles">✨ 🦄 ✨ 🌟 ✨</div>
    </div>
  </div>

  <div class="start" id="start">
    <!-- Floating decorations -->
    <div class="start-deco" aria-hidden="true">
      <div class="kr-cloud s-cloud-1"></div>
      <div class="kr-cloud s-cloud-2"></div>
      <div class="kr-sparkle s-sp-1"></div>
      <div class="kr-sparkle s-sp-2"></div>
      <div class="kr-sparkle s-sp-3"></div>
      <div class="kr-sparkle s-sp-4"></div>
    </div>
    <div class="start-mascot" aria-hidden="true">🦄</div>
    <h1>Englishy</h1>
    <div class="kr-rainbow-bar" style="width:70%;max-width:220px;"></div>
    <div class="sub">Sterre, jouw eigen Engelse vriendinnetje</div>
    <div class="copy">Praat gewoon in het Nederlands en Sterre leert jou stap voor stap leuke Engelse woordjes!</div>
    <button class="startbtn" id="startbtn">Beginnen</button>
    <div class="startnote">Zoek een rustig plekje of doe je koptelefoon op.</div>
  </div>

<script>
(async function () {
  'use strict';

  var _pack = await fetch('/api/config').then(function(r){ return r.json(); }).catch(function() {
    return {
      name: 'Englishy',
      uiCopy: {
        tagline: 'Leer Engels met Sterre!',
        startSubtitle: 'Sterre, jouw eigen Engelse vriendinnetje',
        startBody: 'Praat gewoon in het Nederlands en Sterre leert jou stap voor stap leuke Engelse woordjes!',
        startButton: 'Beginnen',
        micNote: 'Zoek een rustig plekje of doe je koptelefoon op.',
        micIdle: 'Tik om te praten',
        micListening: 'Ik luister… — tik om te stoppen',
        micProcessing: 'Even wachten…',
        micSpeaking: 'Sterre praat…',
      },
      theme: {},
    };
  });

  // Apply pack to DOM
  document.title = _pack.name;
  var _brand = document.querySelector('.brand');
  _brand.childNodes[0].textContent = _pack.name;
  document.querySelector('.tagline').textContent = _pack.uiCopy.tagline;
  var _start = document.getElementById('start');
  _start.querySelector('h1').textContent = _pack.name;
  _start.querySelector('.sub').textContent = _pack.uiCopy.startSubtitle;
  _start.querySelector('.copy').textContent = _pack.uiCopy.startBody;
  document.getElementById('startbtn').textContent = _pack.uiCopy.startButton;
  _start.querySelector('.startnote').textContent = _pack.uiCopy.micNote;
  document.getElementById('miclabel').textContent = _pack.uiCopy.micIdle;

  // Apply theme CSS vars (pack.theme is {} so this is a no-op but kept for future packs)
  var _root = document.documentElement;
  Object.entries(_pack.theme || {}).forEach(function(kv) { _root.style.setProperty(kv[0], kv[1]); });

  var convo = document.getElementById('convo');
  var mic = document.getElementById('mic');
  var micLabel = document.getElementById('miclabel');
  var startScreen = document.getElementById('start');
  var startBtn = document.getElementById('startbtn');
  var toastEl = document.getElementById('toast');

  var history = [];
  var busy = false;
  var recording = false;
  var mediaRecorder = null;
  var chunks = [];
  var autoStop = null;
  var audioCtx = null;
  var currentSource = null;
  var msgCounter = 0;
  var audioStore = {};
  var toastTimer = null;
  var _drillOnStop = null; // set by drillHandleMic; onstop calls it instead of doSend

  // ── Progress store (localStorage) ───────────────────────────────
  var PROGRESS_KEY = 'englishy_progress';

  function loadProgress() {
    try { return JSON.parse(localStorage.getItem(PROGRESS_KEY)) || {}; } catch(e) { return {}; }
  }

  function saveProgress(p) {
    try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); } catch(e) {}
  }

  function getCardState(progress, id) {
    return progress[id] || { ef: 2.5, interval: 0, reps: 0, due: 0, seen: false };
  }

  function sm2Update(state, quality) {
    // quality: 0-2 = wrong, 3-5 = correct
    var s = Object.assign({}, state);
    if (quality < 3) {
      s.reps = 0; s.interval = 1;
    } else {
      if (s.reps === 0) s.interval = 1;
      else if (s.reps === 1) s.interval = 6;
      else s.interval = Math.round(s.interval * s.ef);
      s.reps++;
    }
    s.ef = Math.max(1.3, s.ef + 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
    s.due = Date.now() + s.interval * 24 * 60 * 60 * 1000;
    return s;
  }

  function pickNextCard(cards, progress, filterType) {
    var now = Date.now();
    var pool = filterType ? cards.filter(function(c){ return c.type === filterType; }) : cards;
    // Due cards first (review), then unseen (new), skip not-yet-due
    var due = pool.filter(function(c){ var s = getCardState(progress, c.id); return s.reps > 0 && s.due <= now; });
    if (due.length) return due[0];
    var unseen = pool.filter(function(c){ return !getCardState(progress, c.id).seen; });
    if (unseen.length) return unseen[0];
    // All seen but none due — pick soonest due
    var sorted = pool.slice().sort(function(a,b){ return getCardState(progress,a.id).due - getCardState(progress,b.id).due; });
    return sorted[0] || null;
  }

  function markSeen(cardId) {
    var p = loadProgress();
    if (!p[cardId]) p[cardId] = { ef: 2.5, interval: 0, reps: 0, due: 0, seen: false };
    p[cardId].seen = true;
    saveProgress(p);
  }

  function exportProgress() {
    var data = JSON.stringify({ version: 1, progress: loadProgress() }, null, 2);
    var blob = new Blob([data], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'englishy-progress.json';
    a.click();
  }

  function importProgress(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var obj = JSON.parse(e.target.result);
        if (obj && obj.progress) {
          saveProgress(obj.progress);
          toast('Gelukt! Je voortgang is geladen.');
          if (typeof renderDrillUI === 'function') renderDrillUI();
        }
      } catch(err) { toast('Kon het bestand niet lezen.'); }
    };
    reader.readAsText(file);
  }

  function scanForCards(text) {
    if (!_pack || !_pack.cards) return;
    var lower = text.toLowerCase();
    _pack.cards.forEach(function(card) {
      if (card.type === 'vocab' && card.back) {
        if (lower.includes(card.back.toLowerCase())) markSeen(card.id);
      }
    });
  }

  var LABELS = {
    idle: _pack.uiCopy.micIdle,
    recording: _pack.uiCopy.micListening,
    processing: _pack.uiCopy.micProcessing,
    speaking: _pack.uiCopy.micSpeaking,
  };

  // ── Star system ──────────────────────────────────────────────────
  var STARS_KEY = 'englishy_stars';
  var sessionStars = 0;

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  function loadStars() {
    try {
      var s = JSON.parse(localStorage.getItem(STARS_KEY));
      if (s && typeof s.total === 'number') return s;
    } catch(e) {}
    return { total: 0, today: { date: todayStr(), count: 0 } };
  }

  function saveStars(s) {
    try { localStorage.setItem(STARS_KEY, JSON.stringify(s)); } catch(e) {}
  }

  function updateStarHUD(animateSession) {
    var sessionEl = document.getElementById('star-session');
    var totalEl = document.getElementById('star-total');
    if (sessionEl) {
      sessionEl.textContent = sessionStars;
      if (animateSession) {
        sessionEl.classList.add('pop');
        setTimeout(function() { sessionEl.classList.remove('pop'); }, 350);
      }
    }
    if (totalEl) {
      var s = loadStars();
      totalEl.textContent = s.total;
      if (animateSession) {
        totalEl.classList.add('pop');
        setTimeout(function() { totalEl.classList.remove('pop'); }, 350);
      }
    }
  }

  function spawnStarEarn() {
    var el = document.createElement('div');
    el.className = 'star-earn';
    el.textContent = '⭐';
    // spawn near the star HUD (top-right area)
    el.style.right = (16 + Math.random() * 40) + 'px';
    el.style.top = (60 + Math.random() * 20) + 'px';
    document.body.appendChild(el);
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 1100);
  }

  function showCelebration(msg) {
    var overlay = document.getElementById('star-celebrate');
    var msgEl = document.getElementById('star-celebrate-msg');
    if (!overlay) return;
    if (msgEl) msgEl.textContent = msg;
    overlay.classList.add('show');
    setTimeout(function() {
      overlay.classList.remove('show');
    }, 3200);
  }

  function awardStar() {
    sessionStars++;
    var s = loadStars();
    // Reset today's count if the date changed
    if (!s.today || s.today.date !== todayStr()) {
      s.today = { date: todayStr(), count: 0 };
    }
    s.total++;
    s.today.count++;
    saveStars(s);
    updateStarHUD(true);
    spawnStarEarn();
    // Milestone celebration every 10 total stars
    if (s.total % 10 === 0) {
      showCelebration('Wauw Isa! Al ' + s.total + ' sterren! 🌟');
    }
  }

  // Initialise HUD from store on load
  (function() {
    var s = loadStars();
    var sessionEl = document.getElementById('star-session');
    var totalEl = document.getElementById('star-total');
    if (sessionEl) sessionEl.textContent = '0';
    if (totalEl) totalEl.textContent = s.total;
  })();

  // ── Mode switching ───────────────────────────────────────────────
  var currentMode = 'convo';

  function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.mode === mode);
    });
    // show/hide convo UI
    convo.style.display = (mode === 'convo') ? '' : 'none';
    document.getElementById('dock').style.display = (mode === 'convo' || mode === 'vocab' || mode === 'grammar') ? '' : 'none';
    // show/hide drill panels
    ['vocab','grammar','silent'].forEach(function(m) {
      var el = document.getElementById('drill-' + m);
      if (el) el.classList.toggle('active', mode === m);
    });
    if (mode === 'vocab') renderDrillUI('vocab');
    if (mode === 'grammar') renderDrillUI('grammar');
    if (mode === 'silent') renderSilentUI();
  }

  document.getElementById('tabs').addEventListener('click', function(e) {
    var tab = e.target.closest('.tab');
    if (tab) setMode(tab.dataset.mode);
  });

  // ── Spoken drill (Vocab + Grammar) ──────────────────────────────
  var drillCard = null;

  function renderDrillUI(filterType) {
    var panel = document.getElementById('drill-' + filterType);
    if (!panel) return;
    var progress = loadProgress();
    var card = pickNextCard(_pack.cards, progress, filterType === 'grammar' ? 'conj' : 'vocab');
    drillCard = card;

    if (!card) {
      panel.innerHTML = '<div class="drill-prompt">Goed gedaan! Kom straks terug.</div>';
      return;
    }

    markSeen(card.id);

    // Count due cards
    var now = Date.now();
    var allCards = filterType === 'grammar'
      ? _pack.cards.filter(function(c){ return c.type === 'conj'; })
      : _pack.cards.filter(function(c){ return c.type === 'vocab'; });
    var dueCount = allCards.filter(function(c){ var s = getCardState(progress, c.id); return s.reps > 0 && s.due <= now; }).length;

    panel.innerHTML =
      '<div class="drill-stats">' + dueCount + ' om te oefenen</div>' +
      '<div class="drill-prompt">' + card.front + '</div>' +
      (card.example ? '<div class="drill-example">' + card.example + '</div>' : '') +
      '<div class="drill-feedback" id="drill-fb-' + filterType + '"></div>' +
      '<button class="drill-next" id="drill-next-' + filterType + '" onclick="advanceDrill(\'' + filterType + '\')">Volgende →</button>' +
      '<div class="export-row">' +
        '<button class="export-btn" onclick="exportProgress()">⬇ Opslaan</button>' +
        '<label class="export-btn" style="cursor:pointer">⬆ Laden<input type="file" accept=".json" style="display:none" onchange="importProgress(this.files[0])"></label>' +
      '</div>';

    // Auto-read the prompt aloud
    readCardPrompt(card);
  }

  function readCardPrompt(card) {
    fetch('/api/drill', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ttsOnly: true, text: card.front }),
    })
    .then(function(r){ return r.json(); })
    .then(function(d){ if (d.audio) playB64(d.audio); })
    .catch(function(){});
  }

  function advanceDrill(filterType) {
    drillCard = null;
    renderDrillUI(filterType);
  }

  // ── Silent mode ──────────────────────────────────────────────────
  var silentCard = null;
  var silentAnswered = false;

  function normalise(s) {
    return (s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9\s]/g,'').trim();
  }

  function getDistractors(card, count) {
    var pool = _pack.cards.filter(function(c) {
      return c.id !== card.id && c.type === card.type && c.category === card.category;
    });
    if (pool.length < count) {
      // fall back to same type, different category
      pool = _pack.cards.filter(function(c){ return c.id !== card.id && c.type === card.type; });
    }
    // shuffle and take count
    pool = pool.slice().sort(function(){ return Math.random() - 0.5; });
    return pool.slice(0, count).map(function(c){ return c.back; });
  }

  function renderSilentUI() {
    var panel = document.getElementById('drill-silent');
    if (!panel) return;
    var progress = loadProgress();
    // Silent drills both vocab and conj
    var card = pickNextCard(_pack.cards, progress, null);
    silentCard = card;
    silentAnswered = false;

    if (!card) {
      panel.innerHTML = '<div class="drill-prompt">Goed gedaan! Kom straks terug.</div>';
      return;
    }

    markSeen(card.id);

    var correctAnswer = card.back;
    var distractors = getDistractors(card, 3);
    var options = [correctAnswer].concat(distractors).sort(function(){ return Math.random() - 0.5; });

    var optionsHTML = options.map(function(opt) {
      return '<button class="drill-option" onclick="silentAnswer(this, \'' + opt.replace(/\\/g, '\\\\').replace(/'/g, "\\'") + '\')">' + opt + '</button>';
    }).join('');

    var now = Date.now();
    var dueCount = _pack.cards.filter(function(c){ var s = getCardState(progress, c.id); return s.due <= now && s.reps > 0; }).length;

    panel.innerHTML =
      '<div class="drill-stats">' + dueCount + ' om te oefenen</div>' +
      '<div class="drill-prompt">' + card.front + '</div>' +
      (card.example ? '<div class="drill-example">' + card.example + '</div>' : '') +
      '<div class="drill-options" id="silent-options">' + optionsHTML + '</div>' +
      '<div class="drill-feedback" id="silent-fb"></div>' +
      '<button class="drill-next" id="silent-next" onclick="renderSilentUI()" style="display:none">Volgende →</button>' +
      '<div class="export-row">' +
        '<button class="export-btn" onclick="exportProgress()">⬇ Opslaan</button>' +
        '<label class="export-btn" style="cursor:pointer">⬆ Laden<input type="file" accept=".json" style="display:none" onchange="importProgress(this.files[0])"></label>' +
      '</div>';
  }

  function silentAnswer(btn, chosen) {
    if (silentAnswered || !silentCard) return;
    silentAnswered = true;
    var correct = normalise(chosen) === normalise(silentCard.back);

    // Highlight options
    document.querySelectorAll('.drill-option').forEach(function(b) {
      if (normalise(b.textContent) === normalise(silentCard.back)) b.classList.add('correct-ans');
      else if (b === btn && !correct) b.classList.add('wrong-ans');
    });

    // Feedback
    var fb = document.getElementById('silent-fb');
    if (fb) {
      fb.textContent = correct ? '✓ Goed zo!' : '✗ Het is: ' + silentCard.back;
      fb.className = 'drill-feedback ' + (correct ? 'correct' : 'wrong');
    }

    // Show next button
    var nextBtn = document.getElementById('silent-next');
    if (nextBtn) nextBtn.style.display = 'block';

    // SM-2 update
    var progress = loadProgress();
    var quality = correct ? 4 : 1;
    progress[silentCard.id] = sm2Update(getCardState(progress, silentCard.id), quality);
    saveProgress(progress);

    // Award star for correct answer
    if (correct) awardStar();
  }

  // Expose functions called from inline onclick handlers to window scope
  window.advanceDrill = advanceDrill;
  window.exportProgress = exportProgress;
  window.importProgress = importProgress;
  window.renderSilentUI = renderSilentUI;
  window.silentAnswer = silentAnswer;

  function drillHandleMic() {
    if (currentMode !== 'vocab' && currentMode !== 'grammar') return false;
    if (!drillCard || busy) return true;
    if (!recording) {
      startRecording();
    } else {
      // On stop, run drill evaluation instead of normal conversation send
      _drillOnStop = function(audioBase64, mimeType) {
        setMic('processing');
        busy = true;
        var cardSnapshot = drillCard;
        var filterType = currentMode;
        // Step 1: transcribe via /api/chat
        fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ audio: audioBase64, mimeType: mimeType, history: [], text: '' }),
        })
        .then(function(r){ return r.json(); })
        .then(function(d) {
          return fetch('/api/drill', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ card: cardSnapshot, userAnswer: d.userText || '' }),
          });
        })
        .then(function(r){ return r.json(); })
        .then(function(d) {
          busy = false;
          setMic('idle');
          var fb = document.getElementById('drill-fb-' + filterType);
          var nextBtn = document.getElementById('drill-next-' + filterType);
          if (fb) {
            fb.textContent = d.feedback || (d.correct ? 'Correct!' : 'Not quite.');
            fb.className = 'drill-feedback ' + (d.correct ? 'correct' : 'wrong');
          }
          if (nextBtn) nextBtn.classList.add('show');
          // SM-2 update
          var progress = loadProgress();
          var quality = d.correct ? 4 : 1;
          progress[cardSnapshot.id] = sm2Update(getCardState(progress, cardSnapshot.id), quality);
          saveProgress(progress);
          if (d.audio) playB64(d.audio);
          // Award star for correct spoken drill answer
          if (d.correct) awardStar();
        })
        .catch(function(err) { busy = false; setMic('idle'); toast('Error: ' + (err.message || err)); });
      };
      stopRecording();
    }
    return true;
  }

  function setMic(state) {
    mic.classList.remove('rec', 'busy');
    if (state === 'recording') mic.classList.add('rec');
    if (state === 'processing') mic.classList.add('busy');
    micLabel.textContent = LABELS[state] || LABELS.idle;
  }

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 3400);
  }

  function scrollDown() {
    requestAnimationFrame(function () { convo.scrollTop = convo.scrollHeight; });
  }

  function addMessage(role, text, audioB64) {
    var el = document.createElement('div');
    el.className = 'msg ' + (role === 'tutor' ? 'tutor' : 'user');
    el.appendChild(document.createTextNode(text));

    if (role === 'tutor' && audioB64) {
      var id = 'm' + (++msgCounter);
      audioStore[id] = audioB64;
      var btn = document.createElement('button');
      btn.className = 'replay';
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Nog eens';
      btn.addEventListener('click', function () { playB64(audioStore[id]); });
      el.appendChild(document.createElement('br'));
      el.appendChild(btn);
    }
    convo.appendChild(el);
    scrollDown();
    return el;
  }

  function showThinking() {
    var t = document.createElement('div');
    t.className = 'thinking';
    t.id = 'thinking';
    t.innerHTML = '<span></span><span></span><span></span>';
    convo.appendChild(t);
    scrollDown();
  }
  function hideThinking() {
    var t = document.getElementById('thinking');
    if (t) t.remove();
  }

  function b64ToArrayBuffer(b64) {
    var bin = atob(b64);
    var len = bin.length;
    var bytes = new Uint8Array(len);
    for (var i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
    return bytes.buffer;
  }

  function playB64(b64) {
    if (!b64 || !audioCtx) return;
    try { if (currentSource) currentSource.stop(); } catch (e) {}
    audioCtx.decodeAudioData(b64ToArrayBuffer(b64)).then(function (buffer) {
      var src = audioCtx.createBufferSource();
      src.buffer = buffer;
      src.connect(audioCtx.destination);
      currentSource = src;
      setMic('speaking');
      src.onended = function () { if (!recording) setMic('idle'); };
      src.start(0);
    }).catch(function () { if (!recording) setMic('idle'); });
  }

  function blobToB64(blob) {
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onloadend = function () { resolve(String(reader.result).split(',')[1]); };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  function pickMime() {
    var cands = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/mpeg', 'audio/ogg'];
    for (var i = 0; i < cands.length; i++) {
      if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(cands[i])) return cands[i];
    }
    return '';
  }

  function doSend(payload) {
    busy = true;
    showThinking();
    fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(function (r) { return r.json(); }).then(function (data) {
      hideThinking();
      if (data.error) { toast(data.error); setMic('idle'); busy = false; return; }
      if (data.empty) { toast('Ik hoorde het niet — probeer nog eens.'); setMic('idle'); busy = false; return; }
      if (data.userText) {
        addMessage('user', data.userText, null);
        history.push({ role: 'user', content: data.userText });
      }
      if (data.assistantText) {
        scanForCards(data.assistantText || '');
        addMessage('tutor', data.assistantText, data.audio);
        history.push({ role: 'assistant', content: data.assistantText });
        if (history.length > 16) history = history.slice(-16);
        playB64(data.audio);
      } else {
        setMic('idle');
      }
      busy = false;
    }).catch(function () {
      hideThinking();
      toast('Even geen verbinding — probeer nog eens.');
      setMic('idle');
      busy = false;
    });
  }

  function startRecording() {
    if (busy) return;
    try { if (currentSource) currentSource.stop(); } catch (e) {}
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
      chunks = [];
      var mime = pickMime();
      try {
        mediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
      } catch (e) {
        mediaRecorder = new MediaRecorder(stream);
      }
      mediaRecorder.ondataavailable = function (e) { if (e.data && e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = function () {
        stream.getTracks().forEach(function (t) { t.stop(); });
        var type = mediaRecorder.mimeType || mime || 'audio/webm';
        var blob = new Blob(chunks, { type: type });
        if (blob.size < 1400) { setMic('idle'); toast('Ik hoorde niets — houd de knop iets langer vast.'); return; }
        setMic('processing');
        blobToB64(blob).then(function (b64) {
          if (_drillOnStop) {
            var cb = _drillOnStop;
            _drillOnStop = null;
            cb(b64, blob.type || type);
          } else {
            doSend({ audio: b64, mimeType: blob.type || type, history: history });
          }
        });
      };
      recording = true;
      setMic('recording');
      mediaRecorder.start();
      clearTimeout(autoStop);
      autoStop = setTimeout(function () { if (recording) stopRecording(); }, 40000);
    }).catch(function () {
      setMic('idle');
      toast('Ik heb de microfoon nodig om je te horen — zet die aan in je browser.');
    });
  }

  function stopRecording() {
    if (mediaRecorder && recording) {
      recording = false;
      clearTimeout(autoStop);
      try { mediaRecorder.stop(); } catch (e) {}
    }
  }

  mic.addEventListener('click', function () {
    if (drillHandleMic()) return;
    if (recording) { stopRecording(); return; }
    if (busy) return;
    startRecording();
  });

  startBtn.addEventListener('click', function () {
    // Unlock audio inside the user gesture so playback works on iOS.
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
      audioCtx.resume();
      var b = audioCtx.createBuffer(1, 1, 22050);
      var s = audioCtx.createBufferSource();
      s.buffer = b;
      s.connect(audioCtx.destination);
      s.start(0);
    } catch (e) {}

    startScreen.classList.add('hidden');
    setMic('processing');
    doSend({ start: true, history: [] });
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/sw.js').catch(function () {});
    });
  }
})();
</script>
